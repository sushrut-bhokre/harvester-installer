- apiVersion: v1
  kind: ConfigMap
  metadata:
    namespace: cattle-dashboards
    name: harvester-standalone-cluster-dashboard
    labels:
      grafana_dashboard: "1"
  data:
    k8s-compute-resources-cluster.json: |-
      {
         "editable": false,
         "links": [
            {
               "asDropdown": true,
               "includeVars": true,
               "keepTime": true,
               "tags": [
                  "kubernetes-mixin"
               ],
               "targetBlank": false,
               "title": "Kubernetes",
               "type": "dashboards"
            }
         ],
         "panels": [
            {
               "datasource": {
                  "type": "datasource",
                  "uid": "-- Mixed --"
               },
               "fieldConfig": {
                  "defaults": {
                     "unit": "percentunit"
                  }
               },
               "gridPos": {
                  "h": 3,
                  "w": 4,
                  "x": 0,
                  "y": 0
               },
               "id": 1,
               "interval": "1m",
               "options": {
                  "colorMode": "none"
               },
               "pluginVersion": "v11.1.0",
               "targets": [
                  {
                     "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                     },
                     "expr": "cluster:node_cpu:ratio_rate5m{cluster=\"$cluster\"}",
                     "instant": true
                  }
               ],
               "title": "CPU Utilisation",
               "type": "stat"
            },
            {
               "datasource": {
                  "type": "datasource",
                  "uid": "-- Mixed --"
               },
               "fieldConfig": {
                  "defaults": {
                     "unit": "percentunit"
                  }
               },
               "gridPos": {
                  "h": 3,
                  "w": 4,
                  "x": 4,
                  "y": 0
               },
               "id": 2,
               "interval": "1m",
               "options": {
                  "colorMode": "none"
               },
               "pluginVersion": "v11.1.0",
               "targets": [
                  {
                     "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                     },
                     "expr": "sum(namespace_cpu:kube_pod_container_resource_requests:sum{cluster=\"$cluster\"}) / sum(kube_node_status_allocatable{job=\"kube-state-metrics\",resource=\"cpu\",cluster=\"$cluster\"})",
                     "instant": true
                  }
               ],
               "title": "CPU Requests Commitment",
               "type": "stat"
            },
            {
               "datasource": {
                  "type": "datasource",
                  "uid": "-- Mixed --"
               },
               "fieldConfig": {
                  "defaults": {
                     "unit": "percentunit"
                  }
               },
               "gridPos": {
                  "h": 3,
                  "w": 4,
                  "x": 8,
                  "y": 0
               },
               "id": 3,
               "interval": "1m",
               "options": {
                  "colorMode": "none"
               },
               "pluginVersion": "v11.1.0",
               "targets": [
                  {
                     "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                     },
                     "expr": "sum(namespace_cpu:kube_pod_container_resource_limits:sum{cluster=\"$cluster\"}) / sum(kube_node_status_allocatable{job=\"kube-state-metrics\",resource=\"cpu\",cluster=\"$cluster\"})",
                     "instant": true
                  }
               ],
               "title": "CPU Limits Commitment",
               "type": "stat"
            },
            {
               "datasource": {
                  "type": "datasource",
                  "uid": "-- Mixed --"
               },
               "fieldConfig": {
                  "defaults": {
                     "unit": "percentunit"
                  }
               },
               "gridPos": {
                  "h": 3,
                  "w": 4,
                  "x": 12,
                  "y": 0
               },
               "id": 4,
               "interval": "1m",
               "options": {
                  "colorMode": "none"
               },
               "pluginVersion": "v11.1.0",
               "targets": [
                  {
                     "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                     },
                     "expr": "1 - sum(:node_memory_MemAvailable_bytes:sum{cluster=\"$cluster\"}) / sum(node_memory_MemTotal_bytes{job=\"node-exporter\",cluster=\"$cluster\"})",
                     "instant": true
                  }
               ],
               "title": "Memory Utilisation",
               "type": "stat"
            },
            {
               "datasource": {
                  "type": "datasource",
                  "uid": "-- Mixed --"
               },
               "fieldConfig": {
                  "defaults": {
                     "unit": "percentunit"
                  }
               },
               "gridPos": {
                  "h": 3,
                  "w": 4,
                  "x": 16,
                  "y": 0
               },
               "id": 5,
               "interval": "1m",
               "options": {
                  "colorMode": "none"
               },
               "pluginVersion": "v11.1.0",
               "targets": [
                  {
                     "datasource": {
                        "type": "prometheus",
                        "uid": "${datasource}"
                     },
                     "expr": "sum(namespace_memory:kube_pod_container_resource_requests:sum{cluster=\"$cluster\"}) / sum(kube_node_status_allocatable{job=\"kube-state-metrics\",resource=\"memory\",cluster=\"$cluster\"})",
                     "instant": true
